<footer class="{{ if .Params.footer_glued }}footer footer--glued{{ else }}footer{{ end }}">
    <div class="wrapper">
        <nav class="footer__nav">
            <ul>
                {{ $currentPage := . }}
                {{ range .Site.Menus.main }}
                <li class="{{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}active{{ end }}">
                    <a href="{{ .URL | relURL }}" class="al" target="{{ .Params.target | default "_self" }}">{{ .Name }}</a>
                </li>
                {{ end }}
            </ul>
        </nav>
        <div class="footer__copyright">
            <p>{{ .Site.Params.copyright | default "© 2026 ACCMaR Group, MUST. All rights reserved." }}</p>
        </div>
        <button id="backToTop" class="footer__bttop" aria-label="Back to top" title="Back to top">
            <svg width="20" height="20">
                <use xlink:href="{{ "assets/svg/svg-map.svg#toparrow" | relURL }}" />
            </svg>
        </button>
    </div>
</footer>
<script defer="defer" src="{{ "assets/js/scripts.min.js" | relURL }}"></script>
<script>window.publiiThemeMenuConfig = { mobileMenuMode: "overlay", animationSpeed: 300, submenuWidth: "auto", doubleClickTime: 500, mobileMenuExpandableSubmenus: true, relatedContainerForOverlayMenuSelector: ".top" };</script>
<script>var images = document.querySelectorAll("img[loading]");
    for (var i = 0; i < images.length; i++) {
        if (images[i].complete) {
            images[i].classList.add("is-loaded");
        } else {
            images[i].addEventListener("load", function () {
                this.classList.add("is-loaded");
            }, false);
        }
    }</script>
